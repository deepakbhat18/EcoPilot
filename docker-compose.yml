services:
  db:
    image: postgres:16-alpine
    container_name: ecopilot_db
    environment:
      POSTGRES_USER: ecopilot_user
      POSTGRES_PASSWORD: ecopilot@123
      POSTGRES_DB: ecopilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecopilot_user -d ecopilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: ecopilot_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ecopilot_user:ecopilot%40123@db:5432/ecopilot
      JWT_SECRET_KEY: super_secret_jwt_signing_key_for_ecopilot_development_only_12345
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecopilot_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
